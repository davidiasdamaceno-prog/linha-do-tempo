body{background:#fafaf8;font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s}

.ti{font-family:'DM Serif Display',serif;font-size:15px}
.ri{margin-left:auto;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
button{padding:5px 11px;border-radius:20px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#555;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .2s,border-color .2s,color .2s}
body.dark button{background:#2a2a25;border-color:#444;color:#ccc}
.bg{color:#166534;border-color:#bbf7d0;background:#f0fdf4}
body.dark .bg{color:#4ade80;border-color:#166534;background:#052e16}
.bo{color:#9a3412;border-color:#fed7aa;background:#fff7ed}
body.dark .bo{color:#fb923c;border-color:#7c2d12;background:#1c0a00}
.bb{color:#1e3a5f;border-color:#bfdbfe;background:#eff6ff}
body.dark .bb{color:#60a5fa;border-color:#1e3a5f;background:#0c1a2e}

#hint{padding:3px 16px;font-size:10px;color:#b0a898;flex-shrink:0;border-bottom:1px solid #f0ece6;transition:background .3s}
body.dark #hint{color:#6b6456;border-color:#2a2720}
#wrap{flex:1;overflow:scroll;position:relative}
svg{display:block}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.0);z-index:60;align-items:center;justify-content:center}
#ov.on{display:flex}
#md{background:#fff;border-radius:14px;padding:14px 16px;width:300px;max-height:86vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
body.dark #md{background:#23231f;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.mh{font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:8px}
.fi{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.fi label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
body.dark .fi label{color:#666}
.fi input,.fi select,.fi textarea{font-size:12px;padding:6px 9px;border-radius:8px;border:1px solid #ddd;background:#fafaf8;color:#111;outline:none;width:100%;font-family:'DM Sans',sans-serif}
body.dark .fi input,body.dark .fi select,body.dark .fi textarea{background:#1a1a16;border-color:#3a3730;color:#e0dbd5}
.fi textarea{resize:vertical;min-height:60px;line-height:1.4}
.r2{display:flex;gap:8px}.r2 .fi{flex:1}
.mb{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}

#searchpanel{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e0dbd5;border-radius:12px;padding:12px 16px;box-shadow:0 4px 24px rgba(0,0,0,.12);z-index:45;display:none;align-items:center;gap:8px;min-width:280px}
body.dark #searchpanel{background:#23231f;border-color:#3a3730}
#searchpanel.on{display:flex}
#searchinput{flex:1;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ddd;outline:none;font-family:'DM Sans',sans-serif}
body.dark #searchinput{background:#1a1a16;border-color:#3a3730;color:#e0dbd5}


/* Sidebar */
#sidebar{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:#fff;box-shadow:2px 0 20px rgba(0,0,0,.12);z-index:100;display:flex;flex-direction:column;transition:left .25s cubic-bezier(.4,0,.2,1)}
body.dark #sidebar{background:#1e1e1a}
#sidebar.open{left:0}
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;display:none}
#sidebar-overlay.on{display:block}
#sidebar-header{padding:16px;border-bottom:1px solid #f0ece6;box-sizing:border-box}
body.dark #sidebar-header{border-color:#2a2720}
#sidebar-user-name{font-size:13px;font-weight:600;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark #sidebar-user-name{color:#e0dbd5}
#sidebar-user-email{font-size:10px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sidebar-body{flex:1;overflow-y:auto;padding:8px 0}
.sb-btn{display:flex;align-items:center;gap:12px;padding:11px 20px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:#444;transition:background .15s}
.sb-btn:hover{background:#f5f2ee}
body.dark .sb-btn{color:#ccc}
body.dark .sb-btn:hover{background:#2a2a25}
.sb-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-divider{height:1px;background:#f0ece6;margin:6px 16px}
body.dark .sb-divider{background:#2a2720}
#hamburger{background:none;border:none;cursor:pointer;padding:4px 8px;font-size:20px;color:#888;line-height:1;border-radius:6px}
#hamburger:hover{background:#f0ece6}
body.dark #hamburger:hover{background:#2a2a25}
</style>

// ── Mouse drag (horizontal + vertical, with click-vs-drag detection) ──
var drag={on:false,x:0,y:0,sl:0,st:0,moved:false};
var wp2=document.getElementById('wrap');
var DRAG_THRESHOLD=5; // pixels before we consider it a drag

wp2.addEventListener('mousedown',function(e){
  // Only left button; skip if clicking on form elements
  if(e.button!==0)return;
  var tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='button'||tag==='select'||tag==='textarea')return;
  drag={on:true,x:e.pageX,y:e.pageY,sl:wp2.scrollLeft,st:wp2.scrollTop,moved:false};
  wp2.style.cursor='grabbing';
  e.preventDefault();
});

window.addEventListener('mousemove',function(e){
  if(!drag.on)return;
  var dx=e.pageX-drag.x, dy=e.pageY-drag.y;
  if(!drag.moved&&(Math.abs(dx)>DRAG_THRESHOLD||Math.abs(dy)>DRAG_THRESHOLD)){
    drag.moved=true;
  }
  if(drag.moved){
    wp2.scrollLeft=drag.sl-dx;
    wp2.scrollTop=drag.st-dy;
  }
});

window.addEventListener('mouseup',function(e){
  if(!drag.on)return;
  drag.on=false;
  wp2.style.cursor='grab';
});

// Intercept clicks on SVG elements when a drag just happened
wp2.addEventListener('click',function(e){
  if(drag.moved){
    e.stopPropagation();
    e.preventDefault();
    drag.moved=false;
  }
},true);

wp2.addEventListener('wheel',function(e){
  e.preventDefault();
  var rc=wp2.getBoundingClientRect();
  // Posição do cursor relativa ao conteúdo (em pixels do SVG)
  var cursorX=wp2.scrollLeft+(e.clientX-rc.left);
  var cursorY=wp2.scrollTop+(e.clientY-rc.top);
  // Fração do SVG onde o cursor está
  var fracX=cursorX/wp2.scrollWidth;
  var fracY=cursorY/wp2.scrollHeight;
  var oldZoom=zoom;
  zoom=Math.max(0.25,Math.min(5,zoom+(e.deltaY<0?0.1:-0.1)));

  // Mas queremos que o ponto sob o cursor fique fixo, não o centro
  // Então ajustamos o scroll APÓS o draw via rAF
  cf=fracX; // usado pelo draw para scroll inicial
  draw(false);

  requestAnimationFrame(function(){

    var newScrollH=wp2.scrollHeight;

// Pinch uses CSS transform for silky-smooth gesture; draw() fires only on release.
var touch={on:false,x:0,y:0,sl:0,st:0,moved:false,pinch:false,dist:0,zoomStart:1,mx:0,my:0};

function tDist(t){
  var dx=t[0].pageX-t[1].pageX, dy=t[0].pageY-t[1].pageY;

}
function tMid(t){
  return {x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2};
}

var svgEl=document.getElementById('svg');

    e.preventDefault();

           sl:wp2.scrollLeft, st:wp2.scrollTop,

    var rc=wp2.getBoundingClientRect();
    var mid=tMid(e.touches);

    wp2.scrollTop =touch.my*ratio-cy;

    touch._lastNewZoom=newZoom;

    var dx=e.touches[0].pageX-touch.x, dy=e.touches[0].pageY-touch.y;

  else if(e.key==='ArrowRight'){var wp=document.getElementById('wrap');wp.scrollLeft+=80;}
  else if(e.key==='ArrowUp'){var wp=document.getElementById('wrap');wp.scrollTop-=60;}
  else if(e.key==='ArrowDown'){var wp=document.getElementById('wrap');wp.scrollTop+=60;}

    closeSidebar();
  }
});

// ── PNG export ──
function expPDF(){
  var svgEl2=document.getElementById('svg');
  var w=parseInt(svgEl2.getAttribute('width')), h=parseInt(svgEl2.getAttribute('height'));
  var svgData=new XMLSerializer().serializeToString(svgEl2);
  var b64=btoa(unescape(encodeURIComponent(svgData)));
  var url='data:image/svg+xml;base64,'+b64;
  var img=new Image();
  img.onload=function(){
    var scale=2;
    var canvas=document.createElement('canvas');
    canvas.width=w*scale; canvas.height=h*scale;
    var ctx2=canvas.getContext('2d');
    ctx2.scale(scale,scale);
    ctx2.fillStyle=BG; ctx2.fillRect(0,0,w,h);
    ctx2.drawImage(img,0,0,w,h);
    // Use jsPDF via CDN
    var script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    script.onload=function(){
      var pdf=new window.jspdf.jsPDF({
        orientation: w>h?'landscape':'portrait',
        unit:'px',
        format:[w,h]
      });
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,w,h);
      pdf.save((_currentProjectName||'linha_do_tempo')+'.pdf');
    };
    script.onerror=function(){
      // Fallback: open SVG in new tab for printing
      var win=window.open('','_blank');
      win.document.write('<html><head><title>'+(_currentProjectName||'Linha do Tempo')+'</title><style>body{margin:0}svg{width:100%;height:auto}</style></head><body>'+svgData+'</body></html>');
      win.document.close();
      setTimeout(function(){win.print();},500);
    };
    document.head.appendChild(script);
  };
  img.src=url;
}

var _tip=document.getElementById('tip');
var _tipTimer=null;
function showTip(e,text){
  clearTimeout(_tipTimer);
  _tipTimer=setTimeout(function(){
    _tip.textContent=text;
    _tip.style.display='block';
    moveTip(e);
  },320);
}
function moveTip(e){
  if(_tip.style.display==='none')return;
  var x=e.clientX+14, y=e.clientY-10;
  var tw=_tip.offsetWidth, th=_tip.offsetHeight;
  if(x+tw>window.innerWidth-10) x=e.clientX-tw-14;
  if(y+th>window.innerHeight-10) y=e.clientY-th-10;
  _tip.style.left=x+'px';
  _tip.style.top=y+'px';
}
function hideTip(){
  clearTimeout(_tipTimer);
  _tip.style.display='none';
}
function attachTip(el,text){
  if(!text)return;
  el.addEventListener('mouseenter',function(e){showTip(e,text);});
  el.addEventListener('mousemove',moveTip);
  el.addEventListener('mouseleave',hideTip);
  el.addEventListener('click',hideTip);
}

function fbSave(){
  if(!_fbUser){ alert('Faça login primeiro!'); return; }
  if(marks.length === 0 && brackets.length === 0 && !_currentProjectName){ alert('Nada para salvar — a linha do tempo está vazia.'); return; }
  var btn = document.getElementById('save-btn');
  btn.textContent = '☁ Salvando...';
  btn.disabled = true;
  var projectData = {
    name: _currentProjectName,
    marks: JSON.stringify(marks),
    brackets: JSON.stringify(brackets),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  var ref;
  if(_currentProjectId){
    ref = db.collection('users').doc(_fbUser.uid).collection('projects').doc(_currentProjectId).set(projectData);
  } else {
    ref = db.collection('users').doc(_fbUser.uid).collection('projects').add(projectData).then(function(docRef){
      _currentProjectId = docRef.id;
    });
  }
  ref.then(function(){
    btn.textContent = '✓ Salvo!';
    updateProjectNameDisplay();
    setTimeout(function(){ btn.textContent = '☁ Salvar'; btn.disabled = false; }, 2000);
  }).catch(function(e){
    btn.textContent = '☁ Salvar';
    btn.disabled = false;
    alert('Erro ao salvar: ' + e.message);
  });
}

function fbLoad(){
  if(!_fbUser) return;
  db.collection('users').doc(_fbUser.uid).collection('projects')
    .orderBy('updatedAt','desc').limit(1).get().then(function(snap){
      if(!snap.empty){
        var doc = snap.docs[0];
        var d = doc.data();
        try {
          marks = JSON.parse(d.marks||'[]');
          brackets = JSON.parse(d.brackets||'[]');
          _currentProjectId = doc.id;
          _currentProjectName = d.name||'Minha Linha do Tempo';
          _undoStack = []; _redoStack = [];
          if(marks.length>0){
            var sorted2=marks.slice().sort(function(a,b){return a.year-b.year;});
            _lastAddedYear=sorted2[sorted2.length-1].year;
            _scrollToYear=sorted2[0].year;
          }
          cm(); draw(true);
        } catch(e){ console.error('Erro:', e); }
        updateBlankState(); updateProjectNameDisplay();
      } else {
        // Tenta migrar do formato antigo
        db.collection('timelines').doc(_fbUser.uid).get().then(function(oldDoc){
          if(oldDoc.exists){
            var d = oldDoc.data();
            try {
              var om = JSON.parse(d.marks||'[]');
              var ob = JSON.parse(d.brackets||'[]');
              if(om.length>0||ob.length>0){
                marks=om; brackets=ob;
                _currentProjectName='Minha Linha do Tempo';
                _currentProjectId=null;
                _undoStack=[]; _redoStack=[];
                cm(); draw(true);
                fbSave(); // salva no novo formato
              }
            } catch(e){ console.error('Erro migração:',e); }
          }
          updateBlankState(); updateProjectNameDisplay();
        }).catch(function(){ updateBlankState(); updateProjectNameDisplay(); });
      }
    }).catch(function(e){ 
      console.error('Firestore error:', e);
      updateBlankState(); updateProjectNameDisplay(); 
    });
}

function handleImport(event){
  var file = event.target.files[0];
  if(!file) return;
  var status = document.getElementById('import-status');
  status.textContent = 'Lendo arquivo...';
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    try {
      var importedMarks, importedBrackets;
      if(file.name.endsWith('.json')){
        // JSON format: {marks: [...], brackets: [...]}
        var parsed = JSON.parse(text);
        if(Array.isArray(parsed.marks) && Array.isArray(parsed.brackets)){
          importedMarks = parsed.marks;
          importedBrackets = parsed.brackets;
        } else { throw new Error('Formato JSON inválido'); }
      } else {
        // HTML format — try multiple strategies to extract mdata/bdata
        // Strategy 1: DOMParser
        var parser = new DOMParser();
        var doc = parser.parseFromString(text, 'text/html');
        var mEl = doc.getElementById('mdata');
        var bEl = doc.getElementById('bdata');
        var mText = mEl ? (mEl.textContent||mEl.innerHTML||'').trim() : '';
        var bText = bEl ? (bEl.textContent||bEl.innerHTML||'').trim() : '';
        // Strategy 2: Regex fallback (handles cases where DOMParser strips script content)
        if(!mText || mText==='' || mText==='null'){
          var mMatch = text.match(/id=["']mdata["'][^>]*>([\s\S]*?)<\/script>/i);
          if(mMatch) mText = mMatch[1].trim();
        }
        if(!bText || bText==='' || bText==='null'){
          var bMatch = text.match(/id=["']bdata["'][^>]*>([\s\S]*?)<\/script>/i);
          if(bMatch) bText = bMatch[1].trim();
        }
        if(!mText || !bText) throw new Error('Arquivo HTML não reconhecido como exportação deste site. Certifique-se de usar o botão "↓ HTML" para exportar.');
        importedMarks = JSON.parse(mText);
        importedBrackets = JSON.parse(bText);
      }
      // Always create as NEW project (never overwrite current)
      var projectName = file.name.replace(/\.(html|json)$/i,'').replace(/_/g,' ') || 'Importado';
      marks = importedMarks;
      brackets = importedBrackets;
      _currentProjectId = null; // force new project
      _currentProjectName = projectName;
      _undoStack = []; _redoStack = [];
      status.textContent = '✓ Importado! ('+marks.length+' datas, '+brackets.length+' chaves)';
      status.style.color = '#166534';
      cf = 0.5;
      if(marks.length>0){
        var si=marks.slice().sort(function(a,b){return a.year-b.year;});
        _lastAddedYear=si[si.length-1].year;
        _scrollToYear=si[0].year;
      }
      cm(); draw(true);
      updateBlankState();
      updateProjectNameDisplay();
      setTimeout(function(){
        closeImport();
        if(_fbUser) fbSave(); // save as new project if logged in
      }, 1200);
    } catch(err){
      status.textContent = 'Erro: ' + err.message;
      status.style.color = '#c0392b';
    }
  };
  reader.readAsText(file);
}


cf=0.5;
draw(false);
updateBlankState();
updateProjectNameDisplay();

</script></body></html>
